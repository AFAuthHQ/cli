version: 2

project_name: afauth

before:
  hooks:
    - go mod tidy

builds:
  - id: afauth
    main: ./cmd/afauth
    binary: afauth
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: afauth
    name_template: "afauth_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: afauth
    repository:
      owner: AFAuthHQ
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://afauth.org"
    description: "Agent-First Auth — reference CLI"
    license: "MIT"
    binaries:
      - afauth
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/afauth"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
